services:
  # Frontend (Vite/React)
  app:
    build: .
    container_name: partes-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api

  # Backend (PHP/Apache)
  api:
    build: ./php-backend
    container_name: partes-backend
    ports:
      - "8000:80"
    volumes:
      - ./php-backend:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=partes_app_db
      - DB_USER=root
      - DB_PASS=root
    depends_on:
      - db

  # Database (MySQL)
  db:
    image: mysql:8.0
    container_name: partes-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: partes_app_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-init database with schema
      - ./php-backend/database.sql:/docker-entrypoint-initdb.d/init.sql

  # Database Viewer (Optional)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: partes-pma
    links:
      - db:db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

volumes:
  db_data:
